# ------------------------------------------------------------------------------
#  Map Creature Rate Overrides (per-rank, per-map)
# ------------------------------------------------------------------------------
# These configs let you change creature stats on a per-map basis without editing
# the core. Each map can have its own multipliers for:
#
#   - HP          → Affects total creature health
#   - Damage      → Affects melee and physical attack damage
#   - SpellDamage → Affects spell and ability damage dealt by creatures
#
# Multipliers are defined per creature *rank* (Normal, Elite, RareElite,
# WorldBoss, Rare) and per *map*.
#
# All multipliers default to 1.0, which means "no change".
# You can increase or decrease difficulty by raising or lowering these values.
#
#   Example:
#       Rate.Creature.Map.Outland.Elite.HP = 2.0
#       Rate.Creature.Map.Outland.Elite.Damage = 1.5
#       Rate.Creature.Map.Outland.Elite.SpellDamage = 1.5
#
# This would make elite mobs in Outland have twice as much HP and deal 50% more
# melee and spell damage, while leaving all other creatures unchanged.
#
# Notes:
#   • NPCBots are never modified.
#   • Test and transport maps are ignored (they have no configuration keys).
#   • Changes to HP and melee apply when a creature spawns or respawns.
#   • Spell damage multipliers apply instantly for all creature casts.
#   • Worldboss = Boss level (??)
#
# Example for Karazhan:
#   Rate.Creature.Map.Karazhan.Normal.HP = 1.0
#   Rate.Creature.Map.Karazhan.Elite.HP = 1.2
#   Rate.Creature.Map.Karazhan.WorldBoss.HP = 1.5
#
# Keep values between 0.5 and 10.0 for sanity, but any positive float works.
# For ease of use, use ctrl + F to find the map you want.
# Note that I will be modifying these rates rather than DB values going forward. 
# If you want base 1.0 values, take them from worldserver.conf.dist
# Note that creature-specific overrides can be found in db table mcr_creature_override
# ------------------------------------------------------------------------------

