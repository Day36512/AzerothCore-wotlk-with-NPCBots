#
#    NpcBot.WanderingBots.InactiveWithoutZonePlayers
#        Description:
#                     Enables inactive-zone handling for free wandering world NPCBots.
#
#                     When enabled, wandering world bots check whether any player is
#                     present in their current zone. If the zone is empty, the wanderer
#                     is put to sleep instead of continuing its normal AI update.
#
#                     Sleeping wanderers do not get redistributed into populated zones.
#                     A bot assigned to Zangarmarsh remains a Zangarmarsh wanderer.
#                     It does not migrate to Hellfire just because some poor soul stepped
#                     through the Dark Portal and accidentally rang the dinner bell.
#
#                     With the out-of-world parking implementation enabled in code,
#                     inactive wanderers may be removed from the active map entirely
#                     until a player enters their zone again. This is stronger than
#                     merely hiding them or phasing them, because it prevents large
#                     idle clusters from continuing to exist in the active world.
#
#                     Parked wanderers are restored by a player-side zone activity
#                     trigger, not by their own AI. This matters because once a bot is
#                     parked outside the world, its AI should not be responsible for
#                     waking itself back up. Players entering or ticking inside a zone
#                     wake only the parked wanderers assigned to that same map/zone.
#
#                     This greatly reduces the cost of idle world population while
#                     preserving natural distribution.
#
#        Important:
#                     This setting does not make unlimited wandering bots free.
#                     Large populations still consume memory, startup time, generation
#                     cost, bookkeeping, and wake-up cost when players enter populated
#                     zones. Azeroth remains a world, not a bottomless clown car.
#
#                     For best results, combine this with sane values for:
#
#                         NpcBot.WanderingBots.Continents.Count
#                         NpcBot.WanderingBots.Continents.Maps
#                         NpcBot.WanderingBots.Continents.Levels
#
#                     Avoid concentrating thousands of wanderers into one continent,
#                     one zone, or one narrow level bracket unless that is deliberately
#                     what you want to stress-test.
#
#        Default:     1
#
NpcBot.WanderingBots.InactiveWithoutZonePlayers = 1

# Keep world wanderers from gradually bleeding into neighboring zones.
NpcBot.WanderingBots.StayInAssignedZone = 1

# Keep death/revive from advancing wanderers out of their assigned/current zone.
NpcBot.WanderingBots.ReviveInSameZone = 1

# If a world wanderer keeps choosing its current node because no valid same-zone link exists,
# mill briefly, then teleport to another valid waypoint in the same zone after this many ms.
# Set to 0 to disable the same-node teleport escape hatch.
NpcBot.WanderingBots.SameNodeTeleportDelayMs = 60000


