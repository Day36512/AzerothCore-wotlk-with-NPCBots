#
#    NpcBot.WanderingBots.Continents.Count
#        Description:
#                     Desired number of free wandering bots to generate for open-world
#                     continent maps.
#
#                     Wandering bots roam the world independently. Their names and
#                     visuals are cloned from existing non-spawned NPCBots. They are
#                     generated at runtime and are not saved as normal spawned creatures
#                     in the database.
#
#                     This is one of the most important performance settings for the
#                     wandering bot system. Higher values create a denser and more
#                     lively world, but also increase memory usage, generation cost,
#                     pathing pressure, visibility pressure, and zone wake-up cost.
#
#        Performance:
#                     If inactive-zone handling is enabled, wanderers in empty zones can
#                     sleep or be parked out of the active world. This makes large
#                     wandering populations much more practical, but it does not remove
#                     all cost.
#
#                     The worst case is not simply "many bots." The worst case is many
#                     bots concentrated into a small number of active zones. Three
#                     thousand wanderers spread across Azeroth and Outland is very
#                     different from three thousand wanderers packed into Hellfire
#                     Peninsula like the Burning Legion opened a staffing agency.
#
#        Note:
#                     Wandering bots may keep grids active or cause map/object
#                     bookkeeping depending on the active implementation and whether
#                     they are currently parked out of world.
#
#        Note2:
#                     You must have at least this number of eligible non-spawned bot
#                     templates available for generation.
#
#        Recommended:
#                     For testing, start lower, such as 300-800.
#
#                     For larger living-world setups, 1500-3000 can be reasonable only
#                     if inactive-zone parking is working, continent distribution is
#                     broad, and bots are not concentrated into one level band or map.
#
#        Default:     0 - Disabled
#
NpcBot.WanderingBots.Continents.Count = 3000

#
#    NpcBot.WanderingBots.Continents.Levels
#        Description:
#                     Percentage distribution of wandering continent bots by level
#                     bracket.
#
#                     Brackets are:
#
#                         0-9, 10-19, 20-29, 30-39, 40-49,
#                         50-59, 60-69, 70-79, 80+
#
#                     The total must equal exactly 100.
#
#                     This setting is not just about gameplay pacing. It is also a
#                     performance distribution control. If most wanderers are placed
#                     into the same level range, they are more likely to cluster in the
#                     same expansion maps and zone families.
#
#                     A broad distribution spreads load across more of the world.
#                     A narrow distribution creates a denser, more dangerous, and more
#                     expensive population in the zones matching that level range.
#
#        Note:
#                     Some bot classes or templates with minimum level requirements may
#                     partially ignore low-level brackets.
#
#        Current:
#                     This distribution intentionally leans toward 60-79 content while
#                     still preserving a meaningful low, mid, and level-80 population.
#
#                     It is much safer than placing nearly everything into Outland/TBC
#                     brackets, but with a high total count it can still make 60-79 zones
#                     very dense.
#
#        Default:     7,7,8,8,8,10,18,24,10
#
NpcBot.WanderingBots.Continents.Levels = 7,7,8,8,8,10,18,24,10
