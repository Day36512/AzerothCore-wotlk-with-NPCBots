###########################################################################
# TimeCycle (Seasonal + Time-of-Day Auras)
#
# The TimeCycle system makes Azeroth feel alive by shifting world-wide buffs
# based on both the season and time of day.
#
# Players and NPCBots (if enabled) automatically receive two concurrent effects:
#   1) A Seasonal Aura that changes with the real-world calendar
#      (Spring, Summer, Autumn, Winter)
#   2) A Time-of-Day Aura that rotates on a daily schedule
#      (e.g., Morning, Midday, Evening, Night)
#
# These buffs gently shape gameplay—offering varied bonuses throughout the day
# and year.
#
# Effects apply everywhere except raids by default (configurable). Disabling
# auras in raids ensures players aren't attempting to min-max their auras and login times.
###########################################################################

# Master toggle for the entire TimeCycle system.

TimeCycle.Enabled = 1

# Independent toggles for seasonal and daily systems.

TimeCycle.Seasonal.Enabled = 1
TimeCycle.Daily.Enabled    = 1

# Exclude raids from receiving TimeCycle buffs.
# (Dungeons, Battlegrounds, Arenas, and overworld maps are unaffected.)

TimeCycle.ExcludeRaids = 0

# Log to console whenever the active seasonal or daily aura changes.

TimeCycle.LogChanges = 0

# How often (in milliseconds) the module checks for time/season changes.
# Example: 10000 = every 10 seconds.

TimeCycle.UpdateIntervalMs = 60000

# --------------------------------------------------------------------------
# Seasonal Auras
# Each season applies its own aura spell ID. Set to 0 to disable that season.
# --------------------------------------------------------------------------

TimeCycle.Season.Aura.Spring = 300339
TimeCycle.Season.Aura.Summer = 300340
TimeCycle.Season.Aura.Autumn = 300341
TimeCycle.Season.Aura.Winter = 300342

# Force a specific season manually.
# Options: spring, summer, autumn (or fall), winter
# Leave empty or set to "none" for automatic month-based rotation.

TimeCycle.Season.Force = none

# --------------------------------------------------------------------------
# Time-of-Day Auras
# Defines when each daily aura becomes active (in 24-hour format).
# The current aura is the last entry whose time <= current server time.
#
# Example schedule:
#   04:00 - Morning  (Dawn’s Focus)
#   10:00 - Midday   (Solar Zeal)
#   16:00 - Evening  (Dusk’s Harmony)
#   21:00 - Night    (Moonveil Insight)
# --------------------------------------------------------------------------

TimeCycle.Day.Schedule = "04:00,300344;10:00,300345;16:00,300346;21:00,300347"

