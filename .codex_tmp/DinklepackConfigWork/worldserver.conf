#########
# CHEATS
#########

#
# DefenseRatingCheat
#
#   When enabled (1):
#     - Increases defense rating by 50%. Useful for vanilla content.
#     - Only affects real players; does NOT work on NPCBots.
#     - Bots are generally less squishy anyway.
#
# Default: 0
#

DefenseRatingCheat = 0


#
# DefenseRatingScaler
#
# Different from the quick fix above. Works on bots.
# Scales defense rating item stats in memory at world startup.
# This does NOT permanently modify item_template.
#
DefenseRatingScaler.Enable = 1

#
# Debug logging.
# 0 = summary only
# 1 = log each modified item
#
DefenseRatingScaler.Debug = 0
#
# ItemStatScaler
#
# Scales raw item_template stat values in memory when the worldserver starts.
#
# This does NOT permanently modify item_template in the database.
# The server loads normal item_template values, then this module modifies the
# loaded ItemTemplate values in memory.
#
# IMPORTANT:
# This only works on raw item stats:
#
#   stat_type1/stat_value1
#   stat_type2/stat_value2
#   ...
#   stat_type10/stat_value10
#
# This does NOT work on item stats granted through:
#
#   spellid_1
#   spellid_2
#   spellid_3
#   spellid_4
#   spellid_5
#
# If an item uses an on-equip spell to grant stats, convert that spell into
# raw stat_type/stat_value fields first.
#

ItemStatScaler.Enable = 1

#
# Debug logging.
#
# 0 = summary only
# 1 = log every modified stat slot
#
ItemStatScaler.Debug = 0

#
# Maximum stat slots to scan.
#
# AzerothCore item_template supports stat_type1 through stat_type10.
# Leave this at 10 unless you intentionally only want earlier stat slots.
# Useless for most people.
#
ItemStatScaler.MaxStatSlots = 10

#
# Rule format:
#
#   statTypes:itemLevelRange:qualityList:multiplier
#
# Multiple rules are separated by semicolons.
#
# Examples:
#
#   12:63-90:4,5,6:1.30
#
#     Stat type 12 only
#     Item level 63 through 90
#     Quality 4, 5, or 6
#     Multiply matching stat values by 1.30
#
#   12-15:63-90:4,5,6:1.20
#
#     Stat types 12 through 15
#     Item level 63 through 90
#     Quality 4, 5, or 6
#     Multiply by 1.20
#
#   16-18,31:100-115:3,4:1.15
#
#     Stat types 16, 17, 18, and 31
#     Item level 100 through 115
#     Quality 3 or 4
#     Multiply by 1.15
#
# First matching rule wins for each stat slot.
# So put more specific rules before broader rules if they overlap.
#
# Quality values:
#
#   0 Poor
#   1 Common
#   2 Uncommon
#   3 Rare
#   4 Epic
#   5 Legendary
#   6 Artifact
#   7 Heirloom
#
# Stat type reference:
#
#   0  ITEM_MOD_MANA
#   1  ITEM_MOD_HEALTH
#   3  ITEM_MOD_AGILITY
#   4  ITEM_MOD_STRENGTH
#   5  ITEM_MOD_INTELLECT
#   6  ITEM_MOD_SPIRIT
#   7  ITEM_MOD_STAMINA
#   12 ITEM_MOD_DEFENSE_SKILL_RATING
#   13 ITEM_MOD_DODGE_RATING
