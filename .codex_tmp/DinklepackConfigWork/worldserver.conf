###################################################################################################
# Fake Player Ambience - Dynamic Home Rebasing
#
# Periodically updates both the script's home position and the core creature home position.
# This prevents core leash/home logic from fighting ambience wandering after the fake player
# naturally drifts through towns, stairs, bridges, ramps, and multi-level areas.
###################################################################################################

FakePlayerAmbience.DynamicHomeRebase.Enable = 1

# Only rebase when MotionMaster is idle. Recommended.
# Arrival events force a rebase after a completed MovePoint even with this enabled.
FakePlayerAmbience.DynamicHomeRebase.RequireIdle = 1

# Usually keep this off. Mounted movement should not constantly rewrite home unless you want
# mounted patrols to freely migrate.
FakePlayerAmbience.DynamicHomeRebase.WhileMounted = 0

# Random interval for periodic home rebasing.
FakePlayerAmbience.DynamicHomeRebase.MinMs = 12000
FakePlayerAmbience.DynamicHomeRebase.MaxMs = 45000

# Do not bother rebasing if the creature barely moved from its current home.
FakePlayerAmbience.DynamicHomeRebase.MinDistance = 4.0

# When rebasing, allow minor terrain Z correction, but do not let UpdateAllowedPositionZ
# snap the new home to some cursed basement, cave floor, or bridge underside.
FakePlayerAmbience.DynamicHomeRebase.MaxZCorrection = 8.0


