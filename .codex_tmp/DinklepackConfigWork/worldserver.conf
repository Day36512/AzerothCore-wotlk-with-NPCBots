# KARAZHAN CHESS - ECHO OF MEDIVH CHEATS
#
# Controls Echo of Medivh's PvE cheat behavior during the Karazhan Chess Event.
#
#
###################################################################################################

#
#    Karazhan.Chess.Cheats.Enabled
#
#        Enable or disable Echo of Medivh's cheat events.
#
#        0 = Disabled
#        1 = Enabled
#
#        Default: 1
#
Karazhan.Chess.Cheats.Enabled = 1


#
#    Karazhan.Chess.Cheats.TimerMinMs
#    Karazhan.Chess.Cheats.TimerMaxMs
#
#        Group-mode cheat timer range, in milliseconds.
#
#        Echo of Medivh will perform a cheat at a random interval between these two values.
#        This is the normal multiplayer/group mode timer.
#
#        Default: 45000 / 100000
#
Karazhan.Chess.Cheats.TimerMinMs = 45000
Karazhan.Chess.Cheats.TimerMaxMs = 100000


#
#    Karazhan.Chess.Cheats.SoloTimerMinMs
#    Karazhan.Chess.Cheats.SoloTimerMaxMs
#
#        Solo-mode cheat timer range, in milliseconds.
#
#        Solo mode already has fewer human brains on the board, which is tragic because
#        the remaining human brain is usually also trying to drink coffee and manage children.
#        These defaults make Medivh cheat a little less often in solo mode.
#
#        Default: 60000 / 110000
#        Suggested: 70000 / 120000
#
Karazhan.Chess.Cheats.SoloTimerMinMs = 70000
Karazhan.Chess.Cheats.SoloTimerMaxMs = 120000


#
#    Karazhan.Chess.Cheats.Heal.Weight
#    Karazhan.Chess.Cheats.Fire.Weight
#    Karazhan.Chess.Cheats.Buff.Weight
#
#        Weighted chance for each cheat type.
#
#        Medivh has three possible cheat types:
#
#        Heal = Heals Medivh's king/chief.
#        Fire = Drops fire on player-side chess squares.
#        Buff = Buffs Medivh-side pieces.
#
#        Higher weight means that cheat is more likely.
#        Set a cheat weight to 0 to disable that cheat.
#        If all three weights are 0, no cheat will fire.
#
#        Equal weights of 1 / 1 / 1 means each cheat has about a one-third chance.
#
#        Default: 1 / 1 / 1
#
Karazhan.Chess.Cheats.Heal.Weight = 1
Karazhan.Chess.Cheats.Fire.Weight = 1
Karazhan.Chess.Cheats.Buff.Weight = 1


#
#    Karazhan.Chess.Cheats.Heal.Percent
#
#        Group-mode king/chief heal amount.
#
#        This is a percentage of the king/chief's max health.
#        100 means the classic full heal.
#        0 disables the healing effect without disabling the cheat roll itself.
#
#        Default: 100
#
Karazhan.Chess.Cheats.Heal.Percent = 50


#
#    Karazhan.Chess.Cheats.SoloHeal.Percent
#
#        Solo-mode king/chief heal amount.
#
#        This softens the most annoying Medivh cheat when playing solo.
#        Instead of healing his king/chief to full, Medivh only restores this percent
#        of max health.
#
#        Default: 35
#        Suggested: 25
#
Karazhan.Chess.Cheats.SoloHeal.Percent = 25


#
#    Karazhan.Chess.Cheats.Fire.MaxTargets
#
#        Group-mode max number of player-side squares hit by Medivh's fire cheat.
#
#        The fire cheat targets occupied player-side chess squares.
#        This controls the maximum number of squares selected.
#
#        0 disables the fire effect without disabling the cheat roll itself.
#
#        Default: 3
#
Karazhan.Chess.Cheats.Fire.MaxTargets = 3


#
#    Karazhan.Chess.Cheats.SoloFire.MaxTargets
#
#        Solo-mode max number of player-side squares hit by Medivh's fire cheat.
#
#        Lowering this slightly helps solo mode without removing the danger.
#
#        0 disables the fire effect in solo mode.
#
#        Default: 2
#
Karazhan.Chess.Cheats.SoloFire.MaxTargets = 2


#
#    Karazhan.Chess.Cheats.Buff.MinTargets
#    Karazhan.Chess.Cheats.Buff.MaxTargets
#
#        Group-mode number of Medivh-side pieces buffed by the buff cheat.
#
#        Medivh will randomly buff between MinTargets and MaxTargets pieces.
#        If MaxTargets is 0, the buff effect is disabled.
#
#        Default: 1 / 4
#
Karazhan.Chess.Cheats.Buff.MinTargets = 1
Karazhan.Chess.Cheats.Buff.MaxTargets = 4


#
#    Karazhan.Chess.Cheats.SoloBuff.MinTargets
#    Karazhan.Chess.Cheats.SoloBuff.MaxTargets
#
#        Solo-mode number of Medivh-side pieces buffed by the buff cheat.
#
#        This can be slightly lower than group mode if solo mode still feels like
#        Medivh brought loaded dice and a flamethrower to a board game.
#
#        Default: 1 / 4
#        Suggested: 1 / 3
#
Karazhan.Chess.Cheats.SoloBuff.MinTargets = 1
Karazhan.Chess.Cheats.SoloBuff.MaxTargets = 3

