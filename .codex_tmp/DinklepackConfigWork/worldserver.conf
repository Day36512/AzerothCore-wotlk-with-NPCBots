#
#    NpcBot.WanderingBots.BG.AV.RoleWeight.*
#        Description:
#            Relative weights for temporary Alterac Valley bot objective roles.
#            These values do not need to add up to 100. A value of 0 disables
#            that role from random assignment.
#
#            Emergency/objective overrides can still take priority, such as
#            defending the general, rushing the final boss when towers are down,
#            or responding to a threatened captain.
#
#            TowerAssault:
#                Bots prefer enemy/neutral towers and bunkers.
#
#            CaptainAssault:
#                Bots join the limited Galvangar/Balinda strike group.
#
#            TowerDefense:
#                Bots prefer towers/bunkers your team has assaulted and needs
#                to hold until they burn.
#
#            Frontline:
#                Bots prefer normal forward objectives, mainly graveyards,
#                when no higher-priority tower/captain work is chosen.
#
#            BaseDefense:
#                Bots are eligible reserves for own captain/base responses,
#                without causing the whole team to turtle.
#
#            Scout:
#                Bots can go for mines and lighter side objectives.
#
#        Original defaults:
#            45 - TowerAssault
#            17 - CaptainAssault
#            15 - TowerDefense
#            13 - Frontline
#             7 - BaseDefense
#             3 - Scout
#
NpcBot.WanderingBots.BG.AV.RoleWeight.TowerAssault   = 25
NpcBot.WanderingBots.BG.AV.RoleWeight.CaptainAssault = 20
NpcBot.WanderingBots.BG.AV.RoleWeight.TowerDefense   = 15
NpcBot.WanderingBots.BG.AV.RoleWeight.Frontline      = 25
NpcBot.WanderingBots.BG.AV.RoleWeight.BaseDefense    = 10
NpcBot.WanderingBots.BG.AV.RoleWeight.Scout          = 5

#
#    NpcBot.WanderingBots.BG.AV.RoleDuration.*
#        Description:
#            Minimum and maximum seconds a bot keeps its temporary AV role before
#            rolling a new one. Longer values make bots feel more decisive and
#            less likely to bounce between objectives.
#
#        Original defaults:
#            180 - MinSeconds
#            300 - MaxSeconds
#
NpcBot.WanderingBots.BG.AV.RoleDuration.MinSeconds = 180
NpcBot.WanderingBots.BG.AV.RoleDuration.MaxSeconds = 300

#
#    NpcBot.WanderingBots.BG.AV.AssaultSupportDistance.*
#        Description:
#            Yard radius used when deciding whether enough friendly players/bots
#            are already supporting an assault objective.
#
#            Tower:
#                Used for towers/bunkers. Lower values make bots less likely to
#                count nearby passersby as committed, so more bots may go click
#                or hold the tower. Higher values spread bots away sooner.
#
#            Node:
#                Used for non-tower assault objectives, mainly graveyards.
#
#        Original defaults:
#            25.0 - Tower
#            60.0 - Node
#
NpcBot.WanderingBots.BG.AV.AssaultSupportDistance.Tower = 35.0
NpcBot.WanderingBots.BG.AV.AssaultSupportDistance.Node  = 60.0

#
#    NpcBot.WanderingBots.BG.AV.DefenseSupportDistance.Node
#        Description:
#            Yard radius used when counting defenders around objectives your team
#            has assaulted and needs to hold.
#
#            Lower values assign more bots to sit on contested flags/towers.
#            Higher values make nearby allies count as defenders from farther away.
#
#        Original default:
#            60.0
#
NpcBot.WanderingBots.BG.AV.DefenseSupportDistance.Node = 50.0

#
#    NpcBot.WanderingBots.BG.AV.CoveredNodeDistance
#        Description:
#            Yard radius used to prune objective choices that already have a
#            friendly player/bot nearby. Lower values allow more stacking on the
#            same objective. Higher values spread bots thinner across objectives.
#
#        Original default:
#            40.0
#
NpcBot.WanderingBots.BG.AV.CoveredNodeDistance = 30.0

#
#    NpcBot.WanderingBots.BG.AV.AggroDistance.*
#    NpcBot.WanderingBots.BG.AV.ChaseDistance.*
#        Description:
#            Yard limits for free wandering AV bots noticing and continuing
#            incidental combat targets.
#
#            Lower values make bots more objective-focused.
#            Higher values make them more willing to peel into nearby fights.
#            Direct attackers can still trigger a response.
#
#        Original defaults:
#            35.0 - AggroDistance.Melee
#            45.0 - AggroDistance.Ranged
#            45.0 - ChaseDistance.Melee
#            60.0 - ChaseDistance.Ranged
#
NpcBot.WanderingBots.BG.AV.AggroDistance.Melee = 35.0
NpcBot.WanderingBots.BG.AV.AggroDistance.Ranged = 45.0
NpcBot.WanderingBots.BG.AV.ChaseDistance.Melee = 45.0
NpcBot.WanderingBots.BG.AV.ChaseDistance.Ranged = 60.0

#
# Alterac Valley bot override caps
#
# These limit the big “everyone suddenly turns around” AV behaviors.
# Lower values make bots keep pressing forward more often.
# Higher values make bots more willing to dogpile defensive or boss-related calls.
# Set to 0 to effectively disable that override path.
#
# These affect Alterac Valley bot objective routing only.
#

#
# Enemy boss rally cap.
#
# Controls how many friendly team members can be assigned/considered committed
# to the final boss push once AV conditions say the enemy general is reachable.
#
# Lower this if too many bots abandon map pressure and clump at Vanndar/Drek.
# Raise it if boss pushes feel too weak or bots fail to finish games.
#
# Default: 12
#
NpcBot.WanderingBots.BG.AV.BossRally.MaxBots = 15

#
# Friendly boss defense cap.
#
# Controls how many bots are allowed to respond when your own general is under
# serious attack.
#
# Lower this if AV turns into a turtle because too many bots run home.
# Raise it if bosses are dying too easily with no meaningful defense.
#
# Default: 8
#
NpcBot.WanderingBots.BG.AV.BossDefense.MaxBots = 5

#
# Immediate assaulted-objective defense cap.
#
# Controls the quick-response defense path when one of your owned AV objectives
# is assaulted, such as a tower, bunker, graveyard, or related node.
#
# Lower this if bots keep peeling off the front line every time something blinks.
# Raise it if captured objectives are too easy for the enemy to steal back.
#
# Default: 5
#
NpcBot.WanderingBots.BG.AV.ObjectiveDefense.MaxBots = 3

