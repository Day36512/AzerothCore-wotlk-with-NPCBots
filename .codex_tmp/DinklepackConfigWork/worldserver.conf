# AQ40 - Fankriss
# Background:
#   Players often remain in combat after the hallway of bugs leading to Fankriss the Unyielding,
#   due to creatures despawning across grid boundaries. When Fankriss dies, the instance script can
#   automatically despawn these creatures and block their respawns for the remainder of the raid lock.
#
# Settings:
#
# AQ40.FankrissCleanup.Enable
#   Description:
#       Master toggle for the hallway cleanup system.
#       When enabled, the instance script will:
#         • Mark cleanup as active once Fankriss dies.
#         • Despawn all known hallway bug creatures.
#         • Deliberately load nearby grids to catch any unloaded mobs.
#         • Block their respawn timers until the instance lock expires.
#   Type: Boolean
#   Default: 1 (enabled)
#   Values:
#       0 – Disable cleanup (AQ40 behaves like stock scripts)
#       1 – Enable cleanup (recommended)
#
# AQ40.FankrissCleanup.BlockRespawnSeconds
#   Description:
#       The number of seconds to push creature respawn times into the future when cleanup occurs.
#       This determines how long those mobs remain despawned in this saved instance.
#       The value is written to the instance’s save data via SetRespawnTime + SaveRespawnTime.
#   Type: Integer (seconds)
#   Default: 604800 (7 days)
#   Example:
#       AQ40.FankrissCleanup.BlockRespawnSeconds = 86400   -> 1 day
#       AQ40.FankrissCleanup.BlockRespawnSeconds = 1209600 -> 14 days
#
# Notes:
#   • The cleanup code only triggers once per instance lock when Fankriss dies.
#   • Respawn blocking does not persist across a new reset (fresh instance = fresh spawns).
