mmapsConfig:
  skipLiquid: false
  skipContinents: false
  skipJunkMaps: true
  skipBattlegrounds: false

  # Path to the directory containing navigation data files.
  # This directory should contain the "maps" and "vmaps" folders,
  # and is also where the "mmaps" folder will be created or located.
  dataDir: "./"

  meshSettings:
    # Here we have global config for recast navigation.
    # It's possible to override these data on map or tile level (see mapsOverrides).

    # Maximum slope angle (in degrees) NPCs can walk on.
    # Surfaces steeper than this will be considered unwalkable.
    #
    # CMaNGOS default is 60. Keeping this global value conservative avoids
    # making cliffs and steep terrain look walkable everywhere.
    # Use per-map/per-tile overrides for known problem areas.
    walkableSlopeAngle: 60

    # --- Cell Size Calculation ---
    # Many parameters below are defined in "cell units".
    # In RecastDemo, you often work with world units instead of cell units.
    # By default, these cell units are converted to world units using the formula:
    #
    #     cellSize = MMAP::GRID_SIZE / (verticesPerMapEdge - 1)
    #
    # Where:
    #     MMAP::GRID_SIZE = 533.3333f (the size of one map tile in world units)
    #     verticesPerMapEdge = number of vertices along one edge of the full map grid
    #
    # Example:
    #     If verticesPerMapEdge = 3000, then:
    #         cellSize ≈ 533.3333 / (3000 - 1) ≈ 0.1778 world units per cell
    #
    # To convert a value from cell units to world units (e.g., walkableClimb),
    # multiply by cellSize. For example, a walkableClimb of 6 corresponds to:
    #     6 * 0.1778 ≈ 1.0668 world units

    # Minimum ceiling height (in cell units) NPCs need to pass under an obstacle.
    # Controls how much vertical clearance is required.
    #
    # At verticesPerMapEdge 3000, height 9 is roughly equivalent in world-space
    # to height 6 at verticesPerMapEdge 2000.
    walkableHeight: 9

    # Maximum height difference (in cell units) NPCs can step up or down.
    # Higher values allow walking over fences, ledges, or steps.
    #
    # Vanilla WotLK used 6 at the older/larger cell scale, which allowed creatures
    # to "jump" over fences. Classic-style behavior tends lower. Because this file
    # uses verticesPerMapEdge 3000, climb 6 is roughly equivalent to old climb 4.
    walkableClimb: 6

    # Minimum distance (in cell units) around walkable surfaces.
    # Helps prevent NPCs from clipping into walls and narrow gaps.
    #
    # At verticesPerMapEdge 3000, radius 3 is roughly equivalent in world-space
    # to radius 2 at verticesPerMapEdge 2000.
    walkableRadius: 3

    # Number of vertices along one edge of the entire map's navmesh grid.
    # Higher values increase mesh resolution but also CPU/memory usage.
    verticesPerMapEdge: 3000

    # Number of vertices along one edge of each tile chunk.
    # Must divide according to the generator's expected tile math for seamless tiles.
    # A higher vertex count per tile means fewer total tiles,
    # reducing runtime work to load, unload, and manage tiles.
    verticesPerTileEdge: 80

    # Tolerance for how much a polygon can deviate from the original geometry when simplified.
    # Higher values produce simpler/faster meshes but can reduce accuracy.
    #
    # Since verticesPerMapEdge is already increased to 3000, 1.0 is a safer global
    # first pass than 0.8. Use lower values on cursed tiles if needed.
    maxSimplificationError: 1.0

    # You can override any global parameter for a specific map by specifying its map ID.
    # Inside each map override, you can also override parameters per individual tile,
    # identified by a string "tileX,tileY" (coordinates).
    #
    # Overrides cascade: global settings → map overrides → tile overrides.
    mapsOverrides:
      "48": # Blackfathom Deeps
        # At verticesPerMapEdge 3000, default ch is about 0.1778.
        # 0.3556 is roughly ch*2. This reduces the chance of merging underground levels.
        cellSizeVertical: 0.3556

      "529": # Arathi Basin
        tilesOverrides:
          "30,29": # Lumber Mill
            # Make sure Fear/pathing does not treat the cliff as normally walkable.
            # https://github.com/azerothcore/azerothcore-wotlk/pull/22462#issuecomment-3067024680
            walkableSlopeAngle: 45

      "530": # Outland
        tilesOverrides:
          "32,30": # Dark Portal
            # https://github.com/chromiecraft/chromiecraft/issues/8404#issuecomment-3476012660
            walkableSlopeAngle: 45

          "43,20": # CMaNGOS Outland creature/pathing exception
            # Old CMaNGOS-style climb 6 / height 5 scaled for verticesPerMapEdge 3000.
            walkableClimb: 9
            walkableHeight: 8

      "532": # Karazhan
        tilesOverrides:
          "35,52":
            # CMaNGOS used maxSimplificationError 1.0, height 5, climb 4.
            # Height/climb scaled for verticesPerMapEdge 3000.
            maxSimplificationError: 1.0
            walkableHeight: 8
            walkableClimb: 6

      "540": # The Shattered Halls
        # CMaNGOS used slope 70 here.
        walkableSlopeAngle: 70

      "542": # The Blood Furnace
        # CMaNGOS used slope 50 and climb 5.
        # Climb scaled for verticesPerMapEdge 3000.
        walkableSlopeAngle: 50
        walkableClimb: 8

      "545": # The Steamvault
        # CMaNGOS note: walkableHeight >= 5 or some creatures cannot chase from water to land.
        # Old height 5 / climb 4.5 / radius 1 scaled for verticesPerMapEdge 3000.
        walkableHeight: 8
        walkableClimb: 7
        walkableRadius: 2
        walkableSlopeAngle: 70
        maxSimplificationError: 2.1

      "554": # The Mechanar
        # CMaNGOS used height 5, climb 4.5, slope 60, radius 1.
        # Scaled for verticesPerMapEdge 3000.
        walkableHeight: 8
        walkableClimb: 7
        walkableSlopeAngle: 60
        walkableRadius: 2

      "562": # Blade's Edge Arena
        # CMaNGOS used roughly radius 1 at the old cell size.
        # With verticesPerMapEdge 3000, radius 2 would be the scaled equivalent,
        # but radius 1 may still be needed for the pillar ropes.
        walkableRadius: 1

  # debugOutput generates debug files in the `meshes` directory for use with RecastDemo.
  # This is useful for inspecting and debugging mmap generation visually.
  #
  # Workflow:
  # 1. Install RecastDemo. One usable fork: https://github.com/jackpoz/recastnavigation
  # 2. In-game, move your character to the area you want to debug.
  # 3. Type `.mmap loc` in chat. This outputs:
  #    - The current tile file name (e.g., `04832.mmtile`)
  #    - The Recast config values used to generate that tile
  # 4. Enable `debugOutput` and regenerate mmaps, preferably just the tile from step 3.
  #    - To regenerate only one tile, delete it from the `mmaps` folder.
  # 5. After generation, debug files appear in the `meshes` folder, including OBJ files.
  # 6. Copy these debug files to the `Meshes` folder used by RecastDemo.
  #    - RecastDemo expects this folder to be in the same directory as its executable.
  # 7. In RecastDemo:
  #    - Click "Input Mesh" and select the `.obj` file.
  #    - Choose "Solo Mesh" in the Sample selector.
  # 8. Optionally reuse the Recast config values from `.mmap loc`:
  #    - `cellSizeHorizontal` → "Cell Size"
  #    - `walkableSlopeAngle` → "Max Slope"
  #    - `walkableClimb` → "Max Climb"
  # 9. Scroll to the bottom of the RecastDemo UI and press "Build".
  debugOutput: false
